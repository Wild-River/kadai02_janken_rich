<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>もぐらたたきゲーム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
  <link href="css/output.css" rel="stylesheet">
  <link rel="icon" href="img/favicon.ico" type="image/x-icon">
  <meta property="og:title" content="もぐらたたきゲーム">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://wild-river.github.io/kadai02_janken_rich/">
  <meta property="og:image" content="https://wild-river.github.io/kadai02_janken_rich/img/ogp.jpg">
  <meta property="og:site_name" content="もぐらたたきゲーム">
  <meta property="og:description" content="もぐらたたきゲーム。ピコピコハンマーでモグラを叩いて高スコアを目指そう！5点ごとにレベルアップ！">
  <meta property="og:locale" content="ja_JP">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
</head>

<body class="dotgothic16-regular h-dvh flex flex-col bg-taupe-900">

  <div id="rule-modal" class="fixed inset-0 bg-black/70 z-50 flex items-center justify-center">
    <div
      class="bg-black rounded-2xl p-8 max-w-sm w-full mx-auto text-center border-white border-2 border-solid outline-black outline-6 outline-solid">
      <h2 class="text-2xl text-white font-bold mb-4">ゲームルール</h2>
      <ul class=" text-white mb-6 space-y-2">
        <li>モグラが出たら素早く叩こう！</li>
        <li>＼制限時間は30秒／</li>
        <li>5点ごとにレベルアップ！</li>
        <li>BGMは3種類から選べるよ</li>
      </ul>
      <!-- BGM選択 -->
      <div class="flex items-center gap-2 flex-col mb-6">
        <div class="container flex gap-2 justify-center">
          <button data-bgm="01"
            class="bgm-btn w-1/3 h-10 rounded-full bg-cyan-400 text-white font-bold text-sm transition-all hover:bg-cyan-500 active:scale-95 ring-2 ring-white">
            クラシック
          </button>
          <button data-bgm="02"
            class="bgm-btn w-1/3 h-10 rounded-full bg-cyan-400 text-white font-bold text-sm transition-all hover:bg-cyan-500 active:scale-95">
            ポップ
          </button>
          <button data-bgm="03"
            class="bgm-btn w-1/3 h-10 rounded-full bg-cyan-400 text-white font-bold text-sm transition-all hover:bg-cyan-500 active:scale-95">
            ロック
          </button>
        </div>
      </div>
      <!-- 履歴 -->
      <div id="history-area" class="mb-6 w-5/6 mx-auto">
        <h3 class="font-bold text-white mb-2">--- 過去の記録 ---</h3>
        <ul id="history-list" class="text-sm text-left text-white space-y-1">
        </ul>
      </div>
      <button id="ok-btn"
        class="w-full py-3 rounded-full bg-pink-500 text-white font-bold text-lg hover:bg-pink-600 active:scale-95 transition-all">
        ＯＫ
      </button>
    </div>
  </div>

  <div class="flex gap-2 justify-end p-4">
    <!-- 説明ボタン -->
    <button id="rule-btn"
      class="w-10 h-10 rounded-full bg-yellow-400 text-white font-bold z-50 flex items-center justify-center text-lg">
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"
        viewBox="0 0 12 12"><!-- Icon from Qlementine Icons by Olivier Cléro - https://github.com/oclero/qlementine-icons/blob/master/LICENSE -->
        <path fill="currentColor"
          d="M5.82 3c-.328 0-.61.15-.74.508c-.094.26-.299.492-.575.492s-.5-.172-.5-.498c0-.825.946-1.5 1.82-1.5c1.19 0 2.04 1.12 1.76 2.26a1.83 1.83 0 0 1-.48.849l-.448.448a.5.5 0 0 0-.146.354v.586a.5.5 0 0 1-1 0v-.586c0-.398.158-.779.439-1.06l.448-.448a.82.82 0 0 0-.572-1.404zm.93 5.75a.75.75 0 1 1-1.5 0a.75.75 0 0 1 1.5 0" />
      </svg>
    </button>

    <!-- ミュート -->
    <button id="mute-btn"
      class="w-10 h-10 rounded-full bg-yellow-400 text-white font-bold z-50 flex items-center justify-center">
      <!-- ON用SVG -->
      <svg id="icon-volume-on" xmlns="http://www.w3.org/2000/svg" width="28" height="28"
        viewBox="0 0 20 20"><!-- Icon from HeroIcons v1 Solid by Refactoring UI Inc - https://github.com/tailwindlabs/heroicons/blob/master/LICENSE -->
        <path fill="currentColor" fill-rule="evenodd"
          d="M9.383 3.076A1 1 0 0 1 10 4v12a1 1 0 0 1-1.707.707L4.586 13H2a1 1 0 0 1-1-1V8a1 1 0 0 1 1-1h2.586l3.707-3.707a1 1 0 0 1 1.09-.217m5.274-.147a1 1 0 0 1 1.414 0A9.97 9.97 0 0 1 19 10a9.97 9.97 0 0 1-2.929 7.071a1 1 0 0 1-1.414-1.414A7.97 7.97 0 0 0 17 10a7.97 7.97 0 0 0-2.343-5.657a1 1 0 0 1 0-1.414m-2.829 2.828a1 1 0 0 1 1.415 0A5.98 5.98 0 0 1 15 10a5.98 5.98 0 0 1-1.757 4.243a1 1 0 0 1-1.415-1.415A3.98 3.98 0 0 0 13 10a3.98 3.98 0 0 0-1.172-2.828a1 1 0 0 1 0-1.415"
          clip-rule="evenodd" />
      </svg>
      <!-- OFF用SVG -->
      <svg id="icon-volume-off" xmlns="http://www.w3.org/2000/svg" width="32" height="32"
        viewBox="0 0 20 20"><!-- Icon from HeroIcons v1 Solid by Refactoring UI Inc - https://github.com/tailwindlabs/heroicons/blob/master/LICENSE -->
        <path fill="currentColor" fill-rule="evenodd"
          d="M9.383 3.076A1 1 0 0 1 10 4v12a1 1 0 0 1-1.707.707L4.586 13H2a1 1 0 0 1-1-1V8a1 1 0 0 1 1-1h2.586l3.707-3.707a1 1 0 0 1 1.09-.217m2.91 4.217a1 1 0 0 1 1.414 0L15 8.586l1.293-1.293a1 1 0 1 1 1.414 1.414L16.414 10l1.293 1.293a1 1 0 0 1-1.414 1.414L15 11.414l-1.293 1.293a1 1 0 0 1-1.414-1.414L13.586 10l-1.293-1.293a1 1 0 0 1 0-1.414"
          clip-rule="evenodd" />
      </svg>
    </button>
  </div>

  <div class="p-6 flex flex-col gap-4 container mx-auto">
    <!-- スコア、タイム、レベル -->
    <div class="grid grid-cols-3 gap-3">
      <div class="bg-black rounded-xl border-white border-2 border-solid p-4 flex flex-col items-center gap-2">
        <span class="text-md sm:text-lg text-white">ＳＣＯＲＥ</span>
        <span class="text-3xl text-pink-500 tracking-widest font-bold" id="score">0</span>
      </div>
      <div class="bg-black rounded-xl border-white border-2 border-solid p-4 flex flex-col items-center gap-2">
        <span class="text-md sm:text-lg text-white">ＴＩＭＥ</span>
        <span class="text-3xl text-cyan-500 tracking-widest font-bold" id="time">30</span>
      </div>
      <div class="bg-black rounded-xl border-white border-2 border-solid p-4 flex flex-col items-center gap-2">
        <span class="text-md sm:text-lg text-white">ＬＥＶＥＬ</span>
        <span class="text-3xl text-lime-500 tracking-widest font-bold" id="level">1</span>
      </div>
    </div>
  </div>

  <!-- ステータス -->
  <div id="status" class="text-xl text-white text-center status-fade mb-6">スタートボタンを押してね</div>

  <div id="game-field" class="container mx-auto relative">
    <div id="hammer" class="fixed pointer-events-none z-50"></div>
    <div class="flex flex-col gap-5">
      <!-- 1行目 -->
      <div class="flex justify-center gap-5">
        <div
          class="grid h-20 w-30 xl:h-32 xl:w-48 rounded-[50%/50%] place-items-center bg-yellow-950 text-2xl overflow-hidden hole">
          <img src="img/mogura01.webp" class="mole">
        </div>
        <div
          class="grid h-20 w-30 xl:h-32 xl:w-48 rounded-[50%/50%] place-items-center bg-yellow-950 text-2xl overflow-hidden hole">
          <img src="img/mogura02.webp" class="mole">
        </div>
      </div>
      <!-- 2行目 -->
      <div class="flex justify-center gap-5">
        <div
          class="grid h-20 w-30 xl:h-32 xl:w-48 rounded-[50%/50%] place-items-center bg-yellow-950 text-2xl overflow-hidden hole">
          <img src="img/mogura03.webp" class="mole">
        </div>
        <div
          class="grid h-20 w-30 xl:h-32 xl:w-48 rounded-[50%/50%] place-items-center bg-yellow-950 text-2xl overflow-hidden hole">
          <img src="img/mogura01.webp" class="mole">
        </div>
        <div
          class="grid h-20 w-30 xl:h-32 xl:w-48 rounded-[50%/50%] place-items-center bg-yellow-950 text-2xl overflow-hidden hole">
          <img src="img/mogura02.webp" class="mole">
        </div>
      </div>
      <!-- 3行目 -->
      <div class="flex justify-center gap-5">
        <div
          class="grid h-20 w-30 xl:h-32 xl:w-48 rounded-[50%/50%] place-items-center bg-yellow-950 text-2xl overflow-hidden hole">
          <img src="img/mogura03.webp" class="mole">
        </div>
        <div
          class="grid h-20 w-30 xl:h-32 xl:w-48 rounded-[50%/50%] place-items-center bg-yellow-950 text-2xl overflow-hidden hole">
          <img src="img/mogura01.webp" class="mole">
        </div>
      </div>
    </div>
  </div>

  <!-- ボタン -->
  <div id="message" class="text-red-500 text-center text-2xl 2xl:text-4xl message-fad mt-6"></div>
  <div id="level-up" class="text-orange-500 text-center text-2xl 2xl:text-4xl message-fad mt-3"></div>
  <div class="text-center">
    <button id="start-btn"
      class="text-3xl px-10 py-5 rounded-lg bg-lime-500 text-white cursor-pointer hover:bg-lime-600 active:scale-90 transition-all">
      スタート
    </button>
  </div>

  <script src="js/script.js"></script>
</body>

</html>
